name: Build Android APK

# This tells GitHub to build the app every time you make a change, or when you trigger it manually.
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradle
      run: chmod +x gradlew

    - name: Build the APK
      run: ./gradlew assembleDebug

    - name: Upload APK to Download
      uses: actions/upload-artifact@v4
      with:
        name: BurnInFixer-APK
        path: app/build/outputs/apk/debug/app-debug.apk
